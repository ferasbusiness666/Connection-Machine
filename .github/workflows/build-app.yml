name: Build Connection Machine (App + AI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-app:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache CMake dependency source code
      uses: actions/cache@v4
      env:
        cache-name: cache-cmake-dependency-sources
      with:
        path: ${{github.workspace}}/build/_deps/*-src
        key: ${{ env.cache-name }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
        restore-keys: |
          ${{ env.cache-name }}-

    - name: Cache CMake dependency build objects
      uses: actions/cache@v4
      env:
        cache-name: cache-cmake-dependency-builds
      with:
        path: |
          ${{github.workspace}}/build/_deps/*-build
          ${{github.workspace}}/build/_deps/*-subbuild
        key: ${{ env.cache-name }}-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
        restore-keys: |
          ${{ env.cache-name }}-${{ matrix.os }}-${{ matrix.build_type }}-

    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
         version: 1.4.309.0
         cache: true

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCONNECTION_MACHINE_BUILD_APP=ON -DCONNECTION_MACHINE_BUILD_TESTS=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}} --parallel

    - name: List build artifacts
      run: |
        Get-ChildItem ${{github.workspace}}/build -Recurse -Filter "*.exe" | Select-Object FullName, Length
        Get-ChildItem ${{github.workspace}}/build -Recurse -Filter "*.dll" | Select-Object FullName, Length
